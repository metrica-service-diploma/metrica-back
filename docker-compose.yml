name: metrica-back

services:
  api:
    container_name: metrica-back
    build:
      context: .
      target: final
    ports:
      - "5193:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      db:
        condition: service_healthy
      # clickhouse:
      #   condition: service_healthy
      # redis:
      #   condition: service_healthy
      # rabbitmq:
      #   condition: service_healthy
    restart: unless-stopped
    networks:
      - metrica-network

  db:
    container_name: metrica-back-db
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: metricabackdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d metricabackdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - metrica-network

